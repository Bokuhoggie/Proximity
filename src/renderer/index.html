<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proximity</title>
<meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: http://localhost:* https://*.railway.app;
    connect-src 'self' http://localhost:* ws://localhost:* https://*.railway.app wss://*.railway.app https://cdnjs.cloudflare.com;
    media-src 'self' blob:;
">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="statusOverlay" class="status-overlay" style="display:none;">
    <div class="status-card">
        <div class="status-spinner"></div>
        <div id="statusBanner" class="status-text">Connecting…</div>
    </div>
</div>

<div id="app" class="app">

    <aside class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">Voice</div>
            <div id="voiceList" class="list"></div>
            <div class="voice-controls">
                <button id="voiceJoinBtn" class="btn primary">Join voice</button>
                <button id="voiceLeaveBtn" class="btn danger" style="display:none;">Leave</button>
                <button id="voiceMuteBtn" class="btn ghost" style="display:none;">Mute</button>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Online</div>
            <div id="userList" class="list"></div>
        </div>
    </aside>

    <main class="chat">
        <header class="chat-header"># general</header>

        <div id="messages" class="messages"></div>

        <form id="chatForm" class="composer">
            <button type="button" id="chatAttachBtn" class="btn ghost icon" title="Attach image">📎</button>
            <input id="chatInput" class="composer-input" type="text" placeholder="Message #general — paste images too" autocomplete="off">
            <button type="submit" class="btn primary">Send</button>
            <input id="chatFileInput" type="file" accept="image/*" hidden>
        </form>
    </main>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
