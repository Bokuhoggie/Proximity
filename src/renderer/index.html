<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Proximity</title>
<meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob: http://localhost:* https://*.railway.app;
    connect-src 'self' http://localhost:* ws://localhost:* https://*.railway.app wss://*.railway.app https://cdnjs.cloudflare.com;
    media-src 'self' blob:;
">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="statusOverlay" class="status-overlay" style="display:none;">
    <div class="status-card">
        <div class="status-spinner"></div>
        <div id="statusBanner" class="status-text">Connecting…</div>
    </div>
</div>

<div id="app" class="app">

    <aside class="sidebar">
        <div class="sidebar-section">
            <div class="sidebar-title">Voice</div>
            <div id="voiceList" class="list"></div>
            <div class="voice-controls">
                <button id="voiceJoinBtn" class="btn primary">Join voice</button>
                <button id="voiceLeaveBtn" class="btn danger" style="display:none;">Leave</button>
                <button id="voiceMuteBtn" class="btn ghost" style="display:none;">Mute</button>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-title">Online</div>
            <div id="userList" class="list"></div>
        </div>
    </aside>

    <main class="chat">
        <header class="chat-header">
            <span># general</span>
            <button id="settingsBtn" class="btn ghost icon" title="Settings">⚙</button>
        </header>

        <div id="messages" class="messages"></div>

        <form id="chatForm" class="composer">
            <button type="button" id="chatAttachBtn" class="btn ghost icon" title="Attach image">📎</button>
            <input id="chatInput" class="composer-input" type="text" placeholder="Message #general — paste images too" autocomplete="off">
            <button type="submit" class="btn primary">Send</button>
            <input id="chatFileInput" type="file" accept="image/*" hidden>
        </form>
    </main>

</div>

<div id="settingsModal" class="modal" style="display:none;">
    <div class="modal-card">
        <div class="modal-header">
            <h2>Settings</h2>
            <button id="settingsCloseBtn" class="btn ghost icon" title="Close">✕</button>
        </div>

        <div class="modal-section">
            <label class="field-label" for="inputDeviceSelect">Microphone</label>
            <select id="inputDeviceSelect" class="select"></select>
            <div class="mic-test">
                <button id="micTestBtn" type="button" class="btn ghost">Test mic</button>
                <div class="mic-meter"><div id="micMeterFill" class="mic-meter-fill"></div></div>
            </div>
        </div>

        <div class="modal-section">
            <label class="field-label" for="outputDeviceSelect">Output device</label>
            <select id="outputDeviceSelect" class="select"></select>
            <div class="field-hint">Output selection requires Chromium ≥ 64. If your device doesn't appear, check Windows sound settings.</div>
        </div>

        <div class="modal-section">
            <label class="field-label">Identity</label>
            <div id="identityRow" class="identity-row"></div>
            <button id="resetIdentityBtn" type="button" class="btn ghost small">Reset identity</button>
            <div class="field-hint">Generates a new random username and color on next launch.</div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
